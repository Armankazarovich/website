name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH — git pull + build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -eo pipefail
            REPO="https://${{ secrets.GH_PAT }}@github.com/Armankazarovich/website.git"
            APP_DIR="/home/armankmb/pilo-rus/app"

            if [ -d "$APP_DIR/.git" ]; then
              echo "🔄 Pulling latest code..."
              cd "$APP_DIR"
              git remote set-url origin "$REPO"
              git fetch origin main
              git reset --hard origin/main
            else
              echo "📥 First deploy — cloning repository..."
              rm -rf "$APP_DIR"
              git clone "$REPO" "$APP_DIR"
              cd "$APP_DIR"
            fi

            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps --prefer-offline 2>&1 | tail -5

            echo "🗄️ Syncing database schema..."
            npx prisma db push --skip-generate

            echo "🔨 Building..."
            npm run build

            echo "🚀 Restarting pm2..."
            pm2 restart pilo-rus --update-env
            pm2 save

            echo "✅ Deployed at $(date)"
