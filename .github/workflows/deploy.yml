name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/pilo-rus/app/"
          overwrite: true

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          request_pty: true
          script: |
            bash -l -c "which npm && which pm2 && echo OK || echo FAIL"
            cat ~/.bash_profile 2>/dev/null | grep -i node || echo "no node in bash_profile"
            cat ~/.profile 2>/dev/null | grep -i node || echo "no node in profile"
            cat /etc/environment 2>/dev/null | grep -i node || echo "no node in etc/environment"
