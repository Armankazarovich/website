name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build on CI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      sha_short: ${{ steps.sha.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "value=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Open SSH tunnel to VPS PostgreSQL
        run: |
          # Туннель форкается в фон, живёт до конца job'а.
          # При build Next.js Prisma подключается на localhost:5432 → реально идёт на VPS.
          ssh -f -N -o StrictHostKeyChecking=accept-new \
              -o ExitOnForwardFailure=yes \
              -o ServerAliveInterval=30 \
              -i ~/.ssh/id_ed25519 \
              -L 5432:localhost:5432 \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}"
          sleep 3
          # Sanity check: порт должен слушаться
          if command -v nc >/dev/null 2>&1; then
            nc -z -w 5 localhost 5432 && echo "✅ DB tunnel up (localhost:5432 → VPS)" || { echo "❌ tunnel not listening"; exit 1; }
          else
            # Fallback: bash /dev/tcp
            (echo > /dev/tcp/localhost/5432) 2>/dev/null && echo "✅ DB tunnel up" || { echo "❌ tunnel not listening"; exit 1; }
          fi

      - name: Download .env from server (for build-time NEXT_PUBLIC_*)
        run: |
          scp -o StrictHostKeyChecking=accept-new \
              -i ~/.ssh/id_ed25519 \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/armankmb/pilo-rus/app/.env" \
              .env.production.local
          LINES=$(wc -l < .env.production.local)
          echo "Downloaded $LINES lines"
          # Sanity: critical keys must be present (без их содержимого в логах)
          for KEY in DATABASE_URL NEXT_PUBLIC_VAPID_KEY NEXTAUTH_SECRET; do
            if ! grep -q "^${KEY}=" .env.production.local; then
              echo "FATAL: $KEY missing in downloaded .env — aborting build"
              exit 1
            fi
          done
          echo "✅ critical env keys present"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --prefer-offline

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply DB schema only (via SSH tunnel) — NO data-migrate here!
        env:
          NODE_ENV: production
        run: |
          # ВАЖНО: на CI делаем ТОЛЬКО schema push (нужен чтобы Prisma client совпал с БД при build).
          # data-migrate.ts (tsx prisma/data-migrate.ts) выполняется ПОЗЖЕ на сервере (release step),
          # потому что шаг 7 (восстановление фото категорий) использует existsSync на ЛОКАЛЬНОМ диске —
          # на CI runner'е этих файлов нет, и data-migrate бы перезаписал image на несуществующие пути.
          set -a
          source .env.production.local
          set +a
          echo "🗄️ Applying schema (prisma db push) to prod DB..."
          npx prisma db push --skip-generate 2>&1 | tail -30
          echo "✅ DB schema up to date (data-migrate runs on server, not here)"

      - name: Build Next.js (no DB mutations)
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          set -a
          source .env.production.local
          set +a
          npm run build:ci

      - name: Pack artifact (exclude dev caches)
        run: |
          echo "Size before pack:"
          du -sh .next node_modules 2>/dev/null | head -5
          tar --exclude='node_modules/.cache' \
              --exclude='.next/cache' \
              -czf "build-${{ steps.sha.outputs.value }}.tar.gz" \
              .next \
              node_modules \
              prisma \
              public \
              lib \
              package.json \
              package-lock.json \
              next.config.js \
              tsconfig.json \
              next-env.d.ts
          echo "Archive size: $(du -sh build-${{ steps.sha.outputs.value }}.tar.gz | cut -f1)"

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build-${{ steps.sha.outputs.value }}.tar.gz"
          target: "/home/armankmb/pilo-rus/"
          timeout: 5m

  deploy:
    name: Release on server
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Release + health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -eo pipefail
            APP_DIR="/home/armankmb/pilo-rus/app"
            PREV_DIR="/home/armankmb/pilo-rus/app-previous"
            ARCHIVE="/home/armankmb/pilo-rus/build-${{ needs.build.outputs.sha_short }}.tar.gz"
            BACKUP_DIR="/home/armankmb/pilo-rus/backups"

            echo "💿 Disk before:"
            df -h / | tail -1

            # ── 1. DB backup ──
            echo "🗄️ Backing up database..."
            mkdir -p "$BACKUP_DIR"
            if [ -f "$APP_DIR/.env" ]; then
              DB_URL=$(grep "^DATABASE_URL=" "$APP_DIR/.env" | cut -d'"' -f2 | cut -d"'" -f2)
              if [ -n "$DB_URL" ]; then
                DB_BACKUP="$BACKUP_DIR/db-$(date +%Y%m%d-%H%M%S).sql.gz"
                pg_dump "$DB_URL" 2>/dev/null | gzip > "$DB_BACKUP" && echo "✅ $DB_BACKUP ($(du -sh "$DB_BACKUP" | cut -f1))" || echo "⚠️ backup failed (non-critical)"
              fi
            fi
            ls -t "$BACKUP_DIR"/db-*.sql.gz 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true

            # ── 2. Preserve state (.env, uploads, images) ──
            echo "💾 Preserving state..."
            rm -rf /tmp/pilorus-preserve
            mkdir -p /tmp/pilorus-preserve
            [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" /tmp/pilorus-preserve/.env
            [ -d "$APP_DIR/public/uploads" ] && cp -r "$APP_DIR/public/uploads" /tmp/pilorus-preserve/uploads
            [ -d "$APP_DIR/public/images" ] && cp -r "$APP_DIR/public/images" /tmp/pilorus-preserve/images

            # ── 3. Save previous .next for rollback ──
            rm -rf "$PREV_DIR"
            if [ -d "$APP_DIR/.next" ]; then
              mkdir -p "$PREV_DIR"
              mv "$APP_DIR/.next" "$PREV_DIR/.next"
              echo "✅ Previous .next saved"
            fi

            # ── 4. Extract new build ──
            echo "📂 Extracting new build..."
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            tar -xzf "$ARCHIVE"
            rm -f "$ARCHIVE"

            # ── 5. Restore preserved state (overwrite archive's stubs) ──
            echo "♻️ Restoring .env / uploads / product images..."
            [ -f /tmp/pilorus-preserve/.env ] && cp /tmp/pilorus-preserve/.env "$APP_DIR/.env"
            [ -d /tmp/pilorus-preserve/uploads ] && cp -r /tmp/pilorus-preserve/uploads "$APP_DIR/public/"
            [ -d /tmp/pilorus-preserve/images ] && rm -rf "$APP_DIR/public/images" && cp -r /tmp/pilorus-preserve/images "$APP_DIR/public/"
            rm -rf /tmp/pilorus-preserve

            # ── 6. Apply schema changes + data migrations ──
            echo "🗄️ Applying DB schema + data migrations..."
            # Load .env into shell env so tsx data-migrate sees DATABASE_URL.
            # Prisma CLI loads .env sama, но tsx — нет.
            set -a
            source .env
            set +a
            npm run db:deploy 2>&1 | tail -20

            # ── 7. Restart pm2 ──
            echo "🚀 Restarting pm2..."
            pm2 restart pilo-rus --update-env
            pm2 save

            # ── 8. Health check with retries ──
            echo "🏥 Health check..."
            sleep 8
            HTTP="000"
            for i in 1 2 3 4 5; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:3000/ 2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "✅ Health OK (HTTP $HTTP) on try $i"
                break
              fi
              echo "⏳ Try $i: HTTP $HTTP, retrying in 6s..."
              sleep 6
            done

            if [ "$HTTP" != "200" ]; then
              echo "❌ Health check FAILED (HTTP $HTTP) — rolling back"
              if [ -d "$PREV_DIR/.next" ]; then
                rm -rf "$APP_DIR/.next"
                mv "$PREV_DIR/.next" "$APP_DIR/.next"
                pm2 restart pilo-rus --update-env
                sleep 5
                ROLLBACK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:3000/ 2>/dev/null || echo "000")
                echo "🔄 Rollback result: HTTP $ROLLBACK"
              fi
              exit 1
            fi

            # ── 9. Cleanup ──
            rm -rf "$PREV_DIR" 2>/dev/null || true
            echo "💿 Disk after:"
            df -h / | tail -1

            echo "✅ Deployed ${{ needs.build.outputs.sha_short }} at $(date)"
