name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/pilo-rus/app/"
          overwrite: true

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            find $HOME -name "npm" -type f 2>/dev/null | head -5
            find $HOME -name "node" -type f 2>/dev/null | head -5
            find $HOME -name "pm2" 2>/dev/null | head -5
            ls $HOME/.nvm/versions/ 2>/dev/null || echo "no nvm"
            ls $HOME/node_modules/.bin/pm2 2>/dev/null || echo "no pm2 there"
            env | grep -i node || echo "no node env vars"
