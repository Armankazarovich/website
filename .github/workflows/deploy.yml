name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive (no node_modules, no .git, no uploaded photos)
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./.git' \
            --exclude='./public/images' \
            -czf "$RUNNER_TEMP/deploy.tar.gz" .
          cp "$RUNNER_TEMP/deploy.tar.gz" ./deploy.tar.gz
          echo "Archive size: $(du -sh deploy.tar.gz | cut -f1)"

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/home/armankmb/pilo-rus/"

      - name: Extract and build on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          envs: ANTHROPIC_API_KEY,ELEVENLABS_API_KEY,GOOGLE_AI_API_KEY
          script: |
            set -eo pipefail
            APP_DIR="/home/armankmb/pilo-rus/app"
            ARCHIVE="/home/armankmb/pilo-rus/deploy.tar.gz"

            echo "📂 Extracting code..."
            mkdir -p "$APP_DIR"
            tar -xzf "$ARCHIVE" -C "$APP_DIR"
            rm -f "$ARCHIVE"

            cd "$APP_DIR"

            echo "🔑 Injecting secrets into .env..."
            if [ -n "$ANTHROPIC_API_KEY" ]; then
              if grep -q "^ANTHROPIC_API_KEY=" .env 2>/dev/null; then
                sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=\"$ANTHROPIC_API_KEY\"|" .env
              else
                echo "ANTHROPIC_API_KEY=\"$ANTHROPIC_API_KEY\"" >> .env
              fi
              echo "✅ ANTHROPIC_API_KEY set"
            fi
            if [ -n "$ELEVENLABS_API_KEY" ]; then
              if grep -q "^ELEVENLABS_API_KEY=" .env 2>/dev/null; then
                sed -i "s|^ELEVENLABS_API_KEY=.*|ELEVENLABS_API_KEY=\"$ELEVENLABS_API_KEY\"|" .env
              else
                echo "ELEVENLABS_API_KEY=\"$ELEVENLABS_API_KEY\"" >> .env
              fi
              echo "✅ ELEVENLABS_API_KEY set"
            fi
            if [ -n "$GOOGLE_AI_API_KEY" ]; then
              if grep -q "^GOOGLE_AI_API_KEY=" .env 2>/dev/null; then
                sed -i "s|^GOOGLE_AI_API_KEY=.*|GOOGLE_AI_API_KEY=\"$GOOGLE_AI_API_KEY\"|" .env
              else
                echo "GOOGLE_AI_API_KEY=\"$GOOGLE_AI_API_KEY\"" >> .env
              fi
              echo "✅ GOOGLE_AI_API_KEY set"
            fi

            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps --prefer-offline 2>&1 | tail -5

            echo "🗄️ Syncing database schema..."
            npx prisma db push --skip-generate

            echo "🔨 Building..."
            npm run build

            echo "🚀 Restarting pm2..."
            pm2 restart pilo-rus --update-env
            pm2 save

            echo "✅ Deployed at $(date)"
