name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/pilo-rus/app/"
          overwrite: true

      - name: Update env and create deploy trigger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ENV_FILE=~/pilo-rus/app/.env

            # Update or add SMTP settings
            update_env() {
              local key=$1
              local value=$2
              if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                echo "${key}=${value}" >> "$ENV_FILE"
              fi
            }

            if [ -f "$ENV_FILE" ]; then
              update_env "SMTP_HOST" "mail.beget.com"
              update_env "SMTP_PORT" "587"
              update_env "SMTP_USER" "info@pilo-rus.ru"
              update_env "SMTP_PASSWORD" "${{ secrets.SMTP_PASSWORD }}"
              update_env "ADMIN_EMAIL" "info@pilo-rus.ru"
              update_env "NEXTAUTH_URL" "https://pilo-rus.ru"
              echo "✅ .env updated with SMTP settings"
            else
              echo "⚠️ .env not found at $ENV_FILE"
            fi

            # Create deploy trigger for CronTab
            touch ~/pilo-rus/.deploy-trigger
            echo "✅ Deploy trigger created at $(date)"
