name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/pilo-rus/app/"
          overwrite: true

      - name: Find npm and trigger build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          request_pty: true
          script: |
            echo "=== Searching npm everywhere ==="
            find / -name "npm" -type f 2>/dev/null | grep -v "/proc" | grep -v "/sys" | head -10
            echo "=== Check if files copied correctly ==="
            ls ~/pilo-rus/app/package.json 2>/dev/null && echo "FILES OK" || echo "FILES MISSING"
            echo "=== readlink home ==="
            readlink -f ~
