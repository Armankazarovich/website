name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/armankmb/pilo-rus/app/"
          overwrite: true
          rm: false
          exclude: "node_modules,.next,*.log"

      - name: Build and restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -eo pipefail
            cd /home/armankmb/pilo-rus/app
            echo "🧹 Removing stale server-only files..."
            rm -rf worker/
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps --prefer-offline 2>&1 | tail -5
            echo "🗄️ Syncing database schema..."
            npx prisma db push --skip-generate
            echo "🔨 Building..."
            npm run build
            echo "🚀 Restarting pm2..."
            pm2 restart pilo-rus --update-env
            pm2 save
            echo "✅ Deployed at $(date)"
