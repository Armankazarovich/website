name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive (no node_modules, no .git, no user uploads)
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./.git' \
            --exclude='./public/images/products' \
            --exclude='./public/images/categories' \
            --exclude='./public/images/production' \
            --exclude='./public/uploads' \
            -czf "$RUNNER_TEMP/deploy.tar.gz" .
          cp "$RUNNER_TEMP/deploy.tar.gz" ./deploy.tar.gz
          echo "Archive size: $(du -sh deploy.tar.gz | cut -f1)"

      - name: Upload archive to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USERNAME }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/home/armankmb/pilo-rus/"

      - name: Extract and build on staging server
        uses: appleboy/ssh-action@v1.0.3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USERNAME }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: ANTHROPIC_API_KEY,ELEVENLABS_API_KEY,GOOGLE_AI_API_KEY
          script: |
            set -eo pipefail
            APP_DIR="/home/armankmb/pilo-rus/app"
            PREV_DIR="/home/armankmb/pilo-rus/app-previous"
            ARCHIVE="/home/armankmb/pilo-rus/deploy.tar.gz"
            BACKUP_DIR="/home/armankmb/pilo-rus/backups"
            PM2_NAME="pilorus-staging"
            HEALTH_URL="http://localhost:3000/"

            # ── 0. Диагностика диска ──
            echo "💿 Disk usage BEFORE:"
            df -h / | tail -1

            # ── 0.1 Сохраняем .next для отката ПЕРЕД очисткой ──
            echo "📦 Saving previous .next for rollback..."
            rm -rf "$PREV_DIR"
            if [ -d "$APP_DIR/.next" ]; then
              mkdir -p "$PREV_DIR"
              cp -r "$APP_DIR/.next" "$PREV_DIR/.next"
              echo "✅ Previous .next saved ($(du -sh "$PREV_DIR/.next" | cut -f1))"
            else
              echo "⚠️ No previous .next (first deploy)"
            fi

            # ── 0.2 Сохраняем существующий .env ПЕРЕД распаковкой ──
            # .env на staging должен быть размещён один раз вручную
            # (генерируется setup-скриптом через SSH, не через GitHub Secrets)
            EXISTING_ENV_SAVED=""
            if [ -f "$APP_DIR/.env" ]; then
              echo "💾 Saving existing .env..."
              cp "$APP_DIR/.env" /tmp/staging-env-backup
              EXISTING_ENV_SAVED="yes"
            else
              echo "❌ FATAL: .env missing on staging VPS."
              echo "   Первый раз нужно разместить .env вручную через SSH."
              echo "   Путь: $APP_DIR/.env"
              echo "   Содержимое: DATABASE_URL, NEXTAUTH_SECRET, NEXTAUTH_URL, VAPID_*, TELEGRAM_*, SMTP_*"
              exit 1
            fi

            # ── 0.3 Очистка webpack кэша ──
            echo "🧹 Cleaning webpack cache..."
            npm cache clean --force 2>/dev/null || true
            rm -rf "$APP_DIR/.next/cache/webpack" 2>/dev/null || true

            # ── 1. Бэкап БД staging перед деплоем ──
            echo "🗄️ Backing up staging DB..."
            mkdir -p "$BACKUP_DIR"
            DB_BACKUP="$BACKUP_DIR/db-staging-$(date +%Y%m%d-%H%M%S).sql.gz"
            DB_URL=$(grep "^DATABASE_URL=" "$APP_DIR/.env" 2>/dev/null | cut -d'"' -f2 | cut -d"'" -f2)
            if [ -n "$DB_URL" ]; then
              pg_dump "$DB_URL" 2>/dev/null | gzip > "$DB_BACKUP" && echo "✅ DB backup: $DB_BACKUP ($(du -sh "$DB_BACKUP" | cut -f1))" || echo "⚠️ DB backup failed (non-critical)"
            fi
            ls -t "$BACKUP_DIR"/db-staging-*.sql.gz 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true

            echo "📂 Extracting code..."
            mkdir -p "$APP_DIR"

            # Preserve user uploads (если есть)
            if [ -d "$APP_DIR/public/uploads" ]; then
              echo "💾 Saving uploads..."
              cp -r "$APP_DIR/public/uploads" /tmp/pilorus-staging-uploads-backup
            fi
            if [ -d "$APP_DIR/public/images" ]; then
              echo "💾 Saving product images..."
              cp -r "$APP_DIR/public/images" /tmp/pilorus-staging-images-backup
            fi

            tar -xzf "$ARCHIVE" -C "$APP_DIR"
            rm -f "$ARCHIVE"

            # Восстанавливаем .env (tar не должен был его перезаписать, но для надёжности)
            if [ -f /tmp/staging-env-backup ]; then
              cp /tmp/staging-env-backup "$APP_DIR/.env"
              chmod 600 "$APP_DIR/.env"
              rm -f /tmp/staging-env-backup
              echo "♻️ .env restored"
            fi

            if [ -d /tmp/pilorus-staging-uploads-backup ]; then
              cp -r /tmp/pilorus-staging-uploads-backup "$APP_DIR/public/uploads"
              rm -rf /tmp/pilorus-staging-uploads-backup
            fi
            if [ -d /tmp/pilorus-staging-images-backup ]; then
              cp -r /tmp/pilorus-staging-images-backup "$APP_DIR/public/images"
              rm -rf /tmp/pilorus-staging-images-backup
            fi

            cd "$APP_DIR"

            # ── 2. Инжектим AI-ключи в .env (как prod) ──
            echo "🔑 Injecting AI keys into .env..."
            if [ -n "$ANTHROPIC_API_KEY" ]; then
              if grep -q "^ANTHROPIC_API_KEY=" .env 2>/dev/null; then
                sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=\"$ANTHROPIC_API_KEY\"|" .env
              else
                echo "ANTHROPIC_API_KEY=\"$ANTHROPIC_API_KEY\"" >> .env
              fi
              echo "✅ ANTHROPIC_API_KEY set"
            fi
            if [ -n "$ELEVENLABS_API_KEY" ]; then
              if grep -q "^ELEVENLABS_API_KEY=" .env 2>/dev/null; then
                sed -i "s|^ELEVENLABS_API_KEY=.*|ELEVENLABS_API_KEY=\"$ELEVENLABS_API_KEY\"|" .env
              else
                echo "ELEVENLABS_API_KEY=\"$ELEVENLABS_API_KEY\"" >> .env
              fi
              echo "✅ ELEVENLABS_API_KEY set"
            fi
            if [ -n "$GOOGLE_AI_API_KEY" ]; then
              if grep -q "^GOOGLE_AI_API_KEY=" .env 2>/dev/null; then
                sed -i "s|^GOOGLE_AI_API_KEY=.*|GOOGLE_AI_API_KEY=\"$GOOGLE_AI_API_KEY\"|" .env
              else
                echo "GOOGLE_AI_API_KEY=\"$GOOGLE_AI_API_KEY\"" >> .env
              fi
              echo "✅ GOOGLE_AI_API_KEY set"
            fi

            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps --prefer-offline 2>&1 | tail -5

            echo "🗄️ Syncing staging DB schema..."
            npx prisma db push --skip-generate

            # ── 3. Сборка ──
            echo "🔨 Building (incremental)..."
            npm run build 2>&1 | tee /tmp/build.log
            BUILD_EXIT=$?
            echo "🔍 Build exit code: $BUILD_EXIT"
            df -h / | tail -1

            if [ "$BUILD_EXIT" -ne 0 ]; then
              echo "❌ Build failed"
              grep -i "error\|fail\|ERR!" /tmp/build.log | tail -20 || true
              if [ -d "$PREV_DIR/.next" ]; then
                echo "🔄 Rolling back .next..."
                rm -rf "$APP_DIR/.next"
                cp -r "$PREV_DIR/.next" "$APP_DIR/.next"
                pm2 restart "$PM2_NAME" --update-env 2>/dev/null || true
              fi
              exit 1
            fi

            # ── 4. pm2 restart (или первый start если процесса нет) ──
            echo "🚀 pm2 restart/start..."
            if pm2 describe "$PM2_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
            else
              echo "🆕 First start of $PM2_NAME..."
              pm2 start npm --name "$PM2_NAME" -- start
              pm2 startup systemd -u armankmb --hp /home/armankmb 2>/dev/null || true
            fi
            pm2 save

            # ── 5. Health check ──
            echo "🏥 Health check..."
            sleep 8
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check OK (HTTP $HTTP_CODE)"
            else
              echo "❌ Health check FAILED (HTTP $HTTP_CODE)"
              pm2 logs "$PM2_NAME" --nostream --lines 40 2>/dev/null || true
              if [ -d "$PREV_DIR/.next" ]; then
                echo "🔄 Rolling back to previous version..."
                rm -rf "$APP_DIR/.next"
                cp -r "$PREV_DIR/.next" "$APP_DIR/.next"
                pm2 restart "$PM2_NAME" --update-env
                sleep 5
                ROLLBACK_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" 2>/dev/null || echo "000")
                echo "🔄 Rollback result: HTTP $ROLLBACK_CODE"
              fi
              exit 1
            fi

            # ── 6. Внешняя проверка (HTTPS через nginx → SSL) ──
            echo "🌍 External check (https://staging.pilo-rus.ru/)..."
            sleep 3
            EXT_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://staging.pilo-rus.ru/ 2>/dev/null || echo "000")
            echo "External HTTP code: $EXT_CODE"
            if [ "$EXT_CODE" != "200" ] && [ "$EXT_CODE" != "301" ] && [ "$EXT_CODE" != "302" ]; then
              echo "⚠️ External non-200 (got $EXT_CODE) — nginx/SSL/DNS issue, NOT auto-rollback (local OK)"
            fi

            # ── 7. Финальная очистка ──
            echo "🧹 Post-deploy cleanup..."
            rm -rf "$PREV_DIR" 2>/dev/null || true
            npm cache clean --force 2>/dev/null || true
            df -h / | tail -1

            echo "✅ Staging deployed at $(date)"
            echo "🔗 https://staging.pilo-rus.ru/"
