<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Outer glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9A3C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E8700A" stop-opacity="0"/>
    </radialGradient>
    <!-- Main ball gradient -->
    <radialGradient id="ball" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#FFD580"/>
      <stop offset="30%" stop-color="#FF8C1A"/>
      <stop offset="65%" stop-color="#E8700A"/>
      <stop offset="100%" stop-color="#8B3A00"/>
    </radialGradient>
    <!-- Specular highlight -->
    <radialGradient id="shine" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0F0A"/>
      <stop offset="100%" stop-color="#0D0806"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Main ball -->
  <circle cx="256" cy="256" r="165" fill="url(#ball)"/>

  <!-- Specular shine -->
  <ellipse cx="210" cy="195" rx="80" ry="60" fill="url(#shine)"/>

  <!-- Bottom depth shadow -->
  <ellipse cx="270" cy="330" rx="90" ry="55" fill="#6B2A00" opacity="0.45"/>

  <!-- Letter A -->
  <text
    x="256" y="300"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="160"
    font-weight="900"
    text-anchor="middle"
    fill="#FFFFFF"
    opacity="0.92"
    letter-spacing="-4"
  >A</text>
</svg>
