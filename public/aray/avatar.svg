<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a4fa0"/>
      <stop offset="60%" stop-color="#0a2a6a"/>
      <stop offset="100%" stop-color="#050e28"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4a9fff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a1840" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd060"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="60" fill="url(#glow)"/>
  <!-- Stars / light particles -->
  <circle cx="30" cy="28" r="1.5" fill="#90c0ff" opacity="0.7"/>
  <circle cx="88" cy="22" r="1" fill="#ffd060" opacity="0.8"/>
  <circle cx="95" cy="75" r="1.2" fill="#90c0ff" opacity="0.5"/>
  <circle cx="18" cy="72" r="1" fill="#ffd060" opacity="0.6"/>
  <circle cx="55" cy="15" r="0.8" fill="#ffffff" opacity="0.6"/>
  <!-- Gold ring / halo -->
  <circle cx="60" cy="44" r="22" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <!-- Face silhouette -->
  <ellipse cx="60" cy="48" rx="16" ry="19" fill="#1a5fb0" opacity="0.7"/>
  <!-- Eyes glow -->
  <ellipse cx="53" cy="46" rx="3.5" ry="4" fill="#60a5fa" opacity="0.9"/>
  <ellipse cx="67" cy="46" rx="3.5" ry="4" fill="#60a5fa" opacity="0.9"/>
  <ellipse cx="53" cy="46" rx="1.8" ry="2.2" fill="#ffffff"/>
  <ellipse cx="67" cy="46" rx="1.8" ry="2.2" fill="#ffffff"/>
  <!-- Subtle smile -->
  <path d="M 53 56 Q 60 61 67 56" fill="none" stroke="#90c0ff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Body/shoulders -->
  <path d="M 28 100 Q 32 75 60 72 Q 88 75 92 100" fill="#0d2a6a" opacity="0.85"/>
  <!-- Collar glow -->
  <ellipse cx="60" cy="72" rx="14" ry="5" fill="#1e5ab0" opacity="0.6"/>
  <!-- Bottom overlay for rounded effect -->
  <circle cx="60" cy="60" r="59" fill="none" stroke="#3a7fff" stroke-width="0.8" opacity="0.3"/>
</svg>
