<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Sky gradient: warm sunrise -->
    <radialGradient id="sky" cx="50%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="38%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <!-- Sun glow -->
    <radialGradient id="sun" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>
    <!-- Saw blade wood -->
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#92400e"/>
      <stop offset="100%" stop-color="#2d0f00"/>
    </linearGradient>
    <!-- Plank gradient -->
    <linearGradient id="plank1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e38a1a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="plank2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b45309"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="plank3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#92400e"/>
      <stop offset="100%" stop-color="#6b2d05"/>
    </linearGradient>
    <!-- Clip to inner circle -->
    <clipPath id="clip">
      <circle cx="100" cy="100" r="80"/>
    </clipPath>
  </defs>

  <!-- ══ SAW BLADE ══ 20 teeth, outer r=98, valley r=84 -->
  <polygon
    fill="url(#blade)"
    points="
      100,2    113,17   130,7    138,25   158,21   159,41
      179,42   175,62   193,70   183,87   198,100  183,113
      193,130  175,138  179,158  159,159  158,179  138,175
      130,193  113,183  100,198  87,183   70,193   62,175
      42,179   41,159   21,158   25,138   7,130    17,113
      2,100    17,87    7,70     25,62    21,42    41,41
      42,21    62,25    70,7     87,17
    "
  />

  <!-- ══ INNER SCENE ══ -->
  <!-- Sky fill -->
  <circle cx="100" cy="100" r="80" fill="url(#sky)"/>

  <g clip-path="url(#clip)">

    <!-- Sun (behind mountains) -->
    <circle cx="100" cy="96" r="21" fill="url(#sun)" opacity="0.92"/>
    <!-- Sun halo ring -->
    <circle cx="100" cy="96" r="28" fill="none" stroke="#fef9c3" stroke-width="2.5" stroke-dasharray="5 7" opacity="0.45"/>

    <!-- ══ MOUNTAINS ══ -->
    <!-- Left mountain (darker) -->
    <polygon points="15,148  72,88  125,148" fill="#6b2105" opacity="0.88"/>
    <!-- Right mountain -->
    <polygon points="75,148  130,93  185,148" fill="#7c2d12" opacity="0.80"/>
    <!-- Mountain snow/edge highlights -->
    <polyline points="15,148 72,88 125,148" fill="none" stroke="#fde68a" stroke-width="1" opacity="0.3"/>
    <polyline points="75,148 130,93 185,148" fill="none" stroke="#fde68a" stroke-width="1" opacity="0.25"/>

    <!-- ══ PINE TREES (3) — in front of mountains ══ -->

    <!-- Left tree -->
    <polygon points="70,102  61,120  79,120" fill="#14532d"/>
    <polygon points="70,110  59,129  81,129" fill="#166534"/>
    <polygon points="70,119  56,140  84,140" fill="#15803d"/>
    <rect x="66" y="140" width="8" height="8" rx="1" fill="#7c2d12"/>

    <!-- Center tree (tallest) -->
    <polygon points="100,90  90,112  110,112" fill="#14532d"/>
    <polygon points="100,100 88,121  112,121" fill="#166534"/>
    <polygon points="100,111 86,133  114,133" fill="#15803d"/>
    <rect x="96" y="133" width="8" height="9" rx="1" fill="#7c2d12"/>

    <!-- Right tree -->
    <polygon points="130,102 121,120 139,120" fill="#14532d"/>
    <polygon points="130,110 119,129 141,129" fill="#166534"/>
    <polygon points="130,119 116,140 144,140" fill="#15803d"/>
    <rect x="126" y="140" width="8" height="8" rx="1" fill="#7c2d12"/>

    <!-- ══ LUMBER PLANKS ══ -->
    <!-- Ground shadow -->
    <rect x="20" y="147" width="160" height="3" rx="1" fill="#3b0f00" opacity="0.45"/>

    <!-- Plank 1 (top, lightest) -->
    <rect x="20" y="150" width="160" height="9" rx="1.5" fill="url(#plank1)"/>
    <line x1="20" y1="155" x2="180" y2="155" stroke="#7c3010" stroke-width="0.7" opacity="0.5"/>
    <!-- wood grain lines -->
    <line x1="45" y1="150" x2="45" y2="159" stroke="#c2651a" stroke-width="0.5" opacity="0.35"/>
    <line x1="80" y1="150" x2="80" y2="159" stroke="#c2651a" stroke-width="0.5" opacity="0.35"/>
    <line x1="120" y1="150" x2="120" y2="159" stroke="#c2651a" stroke-width="0.5" opacity="0.35"/>
    <line x1="155" y1="150" x2="155" y2="159" stroke="#c2651a" stroke-width="0.5" opacity="0.35"/>

    <!-- Plank 2 -->
    <rect x="20" y="160" width="160" height="9" rx="1.5" fill="url(#plank2)"/>
    <line x1="20" y1="165" x2="180" y2="165" stroke="#6b2105" stroke-width="0.7" opacity="0.5"/>
    <line x1="55" y1="160" x2="55" y2="169" stroke="#9a3a10" stroke-width="0.5" opacity="0.35"/>
    <line x1="100" y1="160" x2="100" y2="169" stroke="#9a3a10" stroke-width="0.5" opacity="0.35"/>
    <line x1="145" y1="160" x2="145" y2="169" stroke="#9a3a10" stroke-width="0.5" opacity="0.35"/>

    <!-- Plank 3 (bottom, darkest) -->
    <rect x="20" y="170" width="160" height="12" rx="1.5" fill="url(#plank3)"/>
    <line x1="20" y1="176" x2="180" y2="176" stroke="#4a1500" stroke-width="0.7" opacity="0.5"/>
    <line x1="60" y1="170" x2="60" y2="182" stroke="#7c2d10" stroke-width="0.5" opacity="0.35"/>
    <line x1="110" y1="170" x2="110" y2="182" stroke="#7c2d10" stroke-width="0.5" opacity="0.35"/>
    <line x1="160" y1="170" x2="160" y2="182" stroke="#7c2d10" stroke-width="0.5" opacity="0.35"/>

  </g>

  <!-- Inner border ring (subtle white glow) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
  <!-- Outer blade shadow/sheen -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
</svg>
